# GitHub Pages configuration
# This file configures the GitHub Pages site for the repository

# Source branch and directory
source:
  branch: main
  path: /docs

# Build settings
build:
  command: npm run deploy:pages
  publish_dir: _site

# Site settings
site:
  title: SyncAudio
  description: Multi-Device Audio Synchronization Library
  url: https://arcodange-org.github.io/sync-audio-js/
  
# Redirects
redirects:
  - from: /sync-audio-js
    to: /
    status: 301
