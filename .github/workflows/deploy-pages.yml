name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'dist/**'
      - 'example/**'
      - 'package.json'
      - 'rollup.config.js'
      - 'tsconfig.json'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Copy files for GitHub Pages
        run: |
          mkdir -p _site
          # Copy docs (main page)
          cp -r docs/* _site/
          # Copy built library
          cp -r dist/* _site/
          # Copy example files
          cp -r example/* _site/
          # Copy source files for reference
          cp -r src/* _site/src/
          # Copy configuration files
          cp package.json _site/
          cp README.md _site/
          cp LICENSE _site/
          cp CHANGELOG.md _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
