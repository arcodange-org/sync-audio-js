name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          # Placeholder for actual unit tests
          # To be implemented with Jest or similar
          echo "Running unit tests..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // Basic validation of imports
            const files = ['AudioPlayer.js', 'BluetoothLatency.js', 'ClockSync.js', 'database.js', 'index.js'];
            files.forEach(file => {
              const content = fs.readFileSync(path.join('src', file), 'utf8');
              if (!content.includes('export')) {
                console.error(\`\${file} missing export statements\`);
                process.exit(1);
              }
            });
            console.log('All source files have export statements');
          "

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test build process
        run: |
          npm run build
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not created"
            exit 1
          fi
          if [ ! -f "dist/index.esm.js" ]; then
            echo "Build failed: dist/index.esm.js not created"
            exit 1
          fi
          echo "Build successful"

      - name: Test server startup
        run: |
          timeout 5 node server.js &
          sleep 2
          curl -s http://localhost:8080/ > /dev/null || echo "Server not responding"
          pkill -f "node server.js" || true
